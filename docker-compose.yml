version: '3.8'

services:
  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=prod_secret_key_please_change
      - DATABASE_PATH=code_review.db
      - OPENAI_API_KEY=your_actual_openai_api_key_here
      - OPENAI_MODEL=gpt-4o
      - GITHUB_TOKEN=your_github_token_here
      - GITHUB_WEBHOOK_SECRET=your_webhook_secret_here
    volumes:
      - db_data:/app/backend/reports
      - ./backend/code_review.db:/app/backend/code_review.db
    restart: always

volumes:
  db_data:
